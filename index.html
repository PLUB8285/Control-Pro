<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZONTES PRO Controller</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; text-align: center; padding: 20px; }
        .card { background-color: #1e1e1e; border-radius: 15px; padding: 20px; margin-top: 20px;}
        button { background: linear-gradient(45deg, #007bff, #00d2ff); border: none; color: white; padding: 15px 30px; font-size: 18px; border-radius: 30px; width: 100%; margin-top: 10px; cursor: pointer;}
        .btn-send { background: linear-gradient(45deg, #28a745, #20c997); }
        input[type="color"] { width: 100px; height: 100px; border: none; border-radius: 50%; cursor: pointer; background: none; }
        .log { margin-top: 15px; font-size: 16px; color: yellow; background: #333; padding: 10px; border-radius: 8px;}
    </style>
</head>
<body>

    <h2>🏍️ ZONTES PRO V3</h2>
    
    <button id="connectBtn">🔗 เชื่อมต่อ Bluetooth</button>
    <div id="statusText" style="margin-top:10px; color:#888;">สถานะ: ยังไม่ได้เชื่อมต่อ</div>

    <div class="card">
        <h3>🎨 ไฟหรี่นิ่ง (ช่อง 1)</h3>
        <input type="color" id="colorPicker" value="#FF0000">
        <button id="sendBtn" class="btn-send">👉 กดเพื่อส่งสีนี้!</button>
        <div id="debugLog" class="log">หน้าจอรอดูสถานะ...</div>
    </div>

    <script>
        // 🚨 รหัสใหม่ ต้องตรงกับใน ESP32 เป๊ะๆ
        const serviceUuid = "12345678-1234-5678-1234-56789abcdef0";
        const characteristicUuid = "12345678-1234-5678-1234-56789abcdef1";
        let myCharacteristic;

        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                document.getElementById('statusText').innerText = "กำลังค้นหา...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ZONTES' }],
                    optionalServices: [serviceUuid]
                });
                
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(serviceUuid);
                myCharacteristic = await service.getCharacteristic(characteristicUuid);
                
                document.getElementById('statusText').innerText = "🟢 เชื่อมต่อ V3 สำเร็จ!";
                document.getElementById('statusText').style.color = "#00FF00";
            } catch(error) {
                document.getElementById('statusText').innerText = "❌ ยกเลิกการเชื่อมต่อ";
            }
        });

        document.getElementById('sendBtn').addEventListener('click', async () => {
            if (!myCharacteristic) return;
            
            const hexColor = document.getElementById('colorPicker').value.toUpperCase();
            const commandString = "DRL_S:" + hexColor;
            
            document.getElementById('debugLog').innerText = "กำลังส่ง...";
            document.getElementById('debugLog').style.color = "yellow";
            
            try {
                let encoder = new TextEncoder();
                let dataArray = encoder.encode(commandString);
                
                // 🚀 ไฮไลท์สำคัญ: เติม .buffer เพื่อส่งข้อมูลดิบๆ ยัดเข้า Android
                await myCharacteristic.writeValueWithoutResponse(dataArray.buffer);
                
                document.getElementById('debugLog').innerText = "✅ ทะลวงสำเร็จ: " + commandString;
                document.getElementById('debugLog').style.color = "#00FF00";
            } catch(error) {
                document.getElementById('debugLog').innerText = "❌ พัง: " + error;
                document.getElementById('debugLog').style.color = "red";
            }
        });
    </script>
</body>
</html>
