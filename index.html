<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZONTES PRO Controller</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; text-align: center; padding: 20px; margin: 0; }
        .card { background-color: #1e1e1e; border-radius: 15px; padding: 20px; margin-top: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        button { background: linear-gradient(45deg, #007bff, #00d2ff); border: none; color: white; padding: 15px 30px; font-size: 18px; border-radius: 30px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        button:active { transform: scale(0.95); }
        input[type="color"] { width: 100px; height: 100px; border: none; border-radius: 50%; cursor: pointer; outline: none; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .status { margin-top: 15px; font-size: 14px; color: #888; }
    </style>
</head>
<body>

    <h2>🏍️ ZONTES PRO V1</h2>
    
    <button id="connectBtn">🔗 เชื่อมต่อ Bluetooth</button>
    <div id="statusText" class="status">สถานะ: ยังไม่ได้เชื่อมต่อ</div>

    <div class="card">
        <h3>🎨 ไฟหรี่นิ่ง (ช่อง 1)</h3>
        <p>เลือกสีที่ต้องการ (เปลี่ยนทันที)</p>
        <input type="color" id="colorPicker" value="#ffffff">
    </div>

    <script>
        const serviceUuid = "19b10000-e8f2-537e-4f6c-d104768a1214";
        const characteristicUuid = "19b10001-e8f2-537e-4f6c-d104768a1214";
        let myCharacteristic;

        // 💡 1. ฟังก์ชันเชื่อมต่อบลูทูธ
        document.getElementById('connectBtn').addEventListener('click', async () => {
            try {
                document.getElementById('statusText').innerText = "กำลังค้นหา...";
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'ZONTES' }],
                    optionalServices: [serviceUuid]
                });
                
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService(serviceUuid);
                myCharacteristic = await service.getCharacteristic(characteristicUuid);
                
                document.getElementById('statusText').innerText = "🟢 เชื่อมต่อสำเร็จ!";
                document.getElementById('statusText').style.color = "#00FF00";
            } catch(error) {
                console.error(error);
                document.getElementById('statusText').innerText = "❌ ยกเลิกการเชื่อมต่อ";
            }
        });

        // 💡 2. ฟังก์ชันส่งรหัสสีไปที่ ESP32 (แก้จุดบอดให้ส่งผ่านมือถือได้ 100%)
        document.getElementById('colorPicker').addEventListener('input', async (event) => {
            if (!myCharacteristic) return;
            
            // ดึงค่าสี เช่น #FF0000 และจัดรูปประโยคคำสั่ง
            const hexColor = event.target.value.toUpperCase();
            const commandString = "DRL_S:" + hexColor;
            
            try {
                // 🚀 แปลงข้อความเป็นรหัสคอมพิวเตอร์ก่อนส่ง (สำคัญมาก!)
                let encoder = new TextEncoder();
                let dataArray = encoder.encode(commandString);
                
                // 🚀 ส่งข้อมูลแบบไม่รอตอบกลับ (รองรับ Android ทุกรุ่น)
                await myCharacteristic.writeValueWithoutResponse(dataArray);
                console.log("ส่งข้อมูลสำเร็จ:", commandString);
            } catch(error) {
                console.error("ส่งข้อมูลไม่ผ่าน:", error);
            }
        });
    </script>
</body>
</html>
